    setStudents(prev=>{ const without=prev.filter(s=>!(s._placeholder&&s.ppliEmail===ppli.email)); return [...without,{id:newId,...studentForm,name:studentForm.name.trim().toUpperCase(),ppliEmail:ppli.email,ppliName:ppli.name,ppliPhone:ppli.phone}]; });
    setStudentForm(blankStudent); setShowAddStudent(false); showToast("Student added successfully!");
  };
  const removeStudent=(sid)=>{ const s=students.find(x=>x.id===sid); setConfirmDel({type:"student",id:sid,label:s?.name||sid}); };
  const confirmRemoveStudent=()=>{ setStudents(prev=>prev.filter(s=>s.id!==confirmDel.id)); const ev={...evals}; delete ev[confirmDel.id]; setEvals(ev); setConfirmDel(null); showToast("Student removed."); };

  const handleExcelFile=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{
      try{
        const wb=XLSX.read(evt.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let headerIdx=0;
        for(let i=0;i<Math.min(5,rows.length);i++){
          const r=rows[i].map(c=>String(c).toLowerCase());
          if(r.some(c=>c.includes("student")||c.includes("name")||c.includes("matric"))){ headerIdx=i; break; }
        }
        const headers=rows[headerIdx].map(c=>String(c).trim().toLowerCase());
        const col=(name)=>headers.findIndex(h=>h.includes(name));
        const iStudentName=col("student")>-1?col("student"):col("name");
        const iMatric=col("matric");
        const iPhone=col("phone")>-1?col("phone"):col("contact");
        const iCompany=col("company");
        const iPostcode=col("poscode")>-1?col("poscode"):col("postcode");
        const iDistrict=col("district");
        const iState=col("state");
        const iAddress=col("address");
        const iPpliName=headers.findIndex(h=>h.includes("ppli")&&h.includes("name"));
        const iPpliPhone=headers.findIndex(h=>h.includes("ppli")&&(h.includes("phone")||h.includes("contact")));
        const iPpliEmail=headers.findIndex(h=>h.includes("ppli")&&h.includes("email"));
        const iSvName=headers.findIndex(h=>(h.includes("industrial")||h.includes("sv"))&&h.includes("name")&&!h.includes("ppli"));
        const iSvPhone=headers.findIndex(h=>(h.includes("industrial")||h.includes("sv"))&&(h.includes("phone")||h.includes("contact"))&&!h.includes("ppli"));
        const iSvEmail=headers.findIndex(h=>(h.includes("industrial")||h.includes("sv"))&&h.includes("email")&&!h.includes("ppli"));
        const g=(row,i)=>i>-1&&i<row.length?String(row[i]).trim():"";
        const parsed=[]; const ppliMap=new Map(); const svMap=new Map();
        let currentPpliName="",currentPpliPhone="",currentPpliEmail="";
        for(let i=headerIdx+1;i<rows.length;i++){
          const row=rows[i]; if(row.every(c=>!c)) continue;
          const ppliNameVal=iPpliName>-1?g(row,iPpliName):"";
          const ppliEmailVal=iPpliEmail>-1?g(row,iPpliEmail).toLowerCase():"";
          if(ppliNameVal&&!ppliNameVal.toLowerCase().includes("name")){ currentPpliName=ppliNameVal; currentPpliPhone=iPpliPhone>-1?g(row,iPpliPhone):""; currentPpliEmail=ppliEmailVal; }
          const studentNameRaw=g(row,iStudentName); if(!studentNameRaw||studentNameRaw.toLowerCase().includes("name")) continue;
          let studentName=studentNameRaw; if(studentName.includes("_")) studentName=studentName.split("_").slice(1).join("_").trim();
          studentName=studentName.toUpperCase();
          const svEmail=(iSvEmail>-1?g(row,iSvEmail):"").toLowerCase();
          const svName=iSvName>-1?g(row,iSvName):""; const svPhone=iSvPhone>-1?g(row,iSvPhone):"";
          if(currentPpliEmail&&!ppliMap.has(currentPpliEmail)) ppliMap.set(currentPpliEmail,{name:currentPpliName,email:currentPpliEmail,phone:currentPpliPhone});
          if(svEmail&&svEmail!=="nan"&&!svMap.has(svEmail)) svMap.set(svEmail,{name:svName,email:svEmail,phone:svPhone,company:g(row,iCompany)});
          parsed.push({name:studentName,matricNo:g(row,iMatric)||"—",program:"RY41 - Electronic Engineering Technology",phone:g(row,iPhone),monitoringMode:"Virtual (Google Meet)",submissionMode:"E-Mail",ppliName:currentPpliName,ppliPhone:currentPpliPhone,ppliEmail:currentPpliEmail,companyName:g(row,iCompany),postcode:g(row,iPostcode),district:g(row,iDistrict),state:g(row,iState),address:g(row,iAddress),svName,svPhone,svEmail});
        }
        if(parsed.length===0){showToast("No valid student rows found.","error");return;}
        setUploadPreview({students:parsed,ppliCount:ppliMap.size,svCount:svMap.size});
        showToast(`Preview ready: ${parsed.length} students, ${ppliMap.size} PPLIs, ${svMap.size} SVs.`,"info");
      }catch(err){showToast("Failed to parse Excel: "+err.message,"error");}
    };
    reader.readAsArrayBuffer(file);
  };

                <p className="text-[10px] text-slate-500 mt-1">Demo: li_fkten@unimap.edu.my / FTKENLI_007008009</p>
              </div>

                <input type={f.type} value={ppliForm[f.key]} onChange={e=>setPpliForm({...ppliForm,[f.key]:e.target.value})} placeholder={f.placeholder} className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-unimap-blue focus:outline-none"/></div>
              ))}
            </div>
            <div className="flex gap-3 pt-2">

            <div className="space-y-3">
              {[{label:"Full Name *",key:"name",placeholder:"e.g. Encik Razak bin Ali",type:"text"},{label:"Company Email *",key:"email",placeholder:"e.g. razak@company.com.my",type:"email"},{label:"Phone Number",key:"phone",placeholder:"e.g. 0123456789",type:"text"},{label:"Company Name",key:"company",placeholder:"e.g. GlobeOSS Sdn Bhd",type:"text"}].map(f=>(

                <p className="text-xs font-bold tracking-widest text-slate-500 uppercase">Universiti Malaysia Perlis (UniMAP)</p>
                <h3 className="text-sm font-extrabold text-slate-800">Faculty of Electronic Engineering & Technology</h3>
                <div className="bg-slate-900 text-white text-xs font-extrabold py-1.5 rounded-md mt-2 uppercase tracking-wider">Host Company Evaluation Form — INTRA FKTEN MK03</div>
              </div>
              <div className="grid grid-cols-2 gap-3 bg-slate-50 p-4 rounded-lg border border-slate-200 text-xs">
                {[["Student Name",svActiveStudent.name],["Matric No.",svActiveStudent.matricNo],["Host Company",svActiveStudent.companyName],["Program",svActiveStudent.program],["PPLI Lecturer",svActiveStudent.ppliName],["SV Name",svActiveStudent.svName]].map(([k,v])=>(
                  <div key={k}><p className="text-slate-400 font-semibold">{k}</p><p className="font-bold text-slate-800">{v}</p></div>
                ))}
              </div>
              <div className="bg-teal-50 border border-teal-200 rounded-lg p-3 text-xs text-teal-800 font-semibold">📐 Scoring Formula: Total Marks = (Sum of ratings × 40) / 65 = __ / 40%</div>
              {(()=>{
                const groups=[
                  {label:"CO2/PO5 — Technical Competency",criteria:["c1"]},
                  {label:"CO3/PO6 — Engineering Problem Solving",criteria:["c2","c3"]},
                  {label:"CO4/PO7 — Work Ethics & Professionalism",criteria:["c4","c5","c6"]},
                  {label:"CO5/PO8 — Instruction & Teamwork",criteria:["c7","c8"]},
                  {label:"CO6/PO9 — Communication & Presentation",criteria:["c9","c10","c11"]},
                  {label:"CO7/PO11 — Independence & Initiative",criteria:["c12","c13"]},
                ];
                return groups.map(g=>(
                  <div key={g.label} className="space-y-3">
                    <div className="flex items-center gap-2"><div className="h-px flex-grow bg-slate-200"></div><span className="text-[10px] font-extrabold uppercase tracking-wider text-teal-700 whitespace-nowrap">{g.label}</span><div className="h-px flex-grow bg-slate-200"></div></div>
                    {g.criteria.map(ck=>{
                      const c=MK03_CRITERIA.find(x=>x.key===ck); const curVal=svDraft[ck]||0;
                      return (<div key={ck} className="p-4 bg-slate-50 rounded-xl border border-slate-200 space-y-3">
                        <div className="flex justify-between items-start gap-2">
                          <div className="flex-grow">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-[10px] bg-teal-100 text-teal-700 font-bold px-2 py-0.5 rounded">{c.co}</span>
                              <span className="text-[10px] text-slate-400 font-semibold">Criterion {c.no}</span>
                            </div>
                            <h5 className="text-sm font-bold text-slate-800 mt-1">{c.title}</h5>
                            <p className="text-xs text-slate-500 mt-0.5">{c.desc}</p>
                          </div>
                          <div className="text-center shrink-0"><span className="block text-2xl font-extrabold text-teal-700">{curVal}</span><span className="block text-[9px] text-slate-400 font-bold">/5</span></div>
                        </div>
                        <div className="flex gap-1.5 flex-wrap">
                          {[5,4,3,2,1,0].map(r=>(
                            <button key={r} type="button" onClick={()=>setSvDraft({...svDraft,[ck]:r})}
                              className={"flex-1 min-w-[40px] px-2 py-2 rounded-lg border text-sm font-bold transition-all "+(curVal===r?"bg-teal-700 text-white border-teal-700 shadow":"bg-white hover:bg-slate-50 border-slate-200 text-slate-700")}>
                              <span className="block text-base leading-tight">{r}</span>
                              <span className="block text-[8px] uppercase leading-none mt-0.5">{r===5?"Excel":r===4?"Good":r===3?"Fair":r===2?"Weak":r===1?"Poor":"None"}</span>
                            </button>
                          ))}
                        </div>
                        <p className="text-[11px] text-teal-800 bg-teal-50 border border-teal-100 rounded-lg px-3 py-2 italic">▸ {c.rubric[curVal]}</p>
                      </div>);
                    })}
                  </div>
                ));
              })()}
              {(()=>{ const c=calcSV(svDraft); return (
                <div className="bg-teal-50 border-2 border-teal-300 rounded-xl p-5 space-y-3">
                  <h4 className="font-extrabold text-teal-800 text-sm uppercase tracking-wide">Score Summary</h4>
                  <div className="grid grid-cols-3 gap-4 text-center">
                    <div className="bg-white rounded-lg p-3 border border-teal-100"><p className="text-[10px] font-bold text-slate-500 uppercase">Sum of Ratings</p><p className="text-2xl font-extrabold text-slate-800">{c.sum}</p><p className="text-[10px] text-slate-400">out of {c.max}</p></div>
                    <div className="bg-white rounded-lg p-3 border border-teal-100"><p className="text-[10px] font-bold text-slate-500 uppercase">Formula</p><p className="text-sm font-bold text-slate-600">({c.sum} × 40) ÷ 65</p></div>
                    <div className="bg-teal-700 text-white rounded-lg p-3"><p className="text-[10px] font-bold text-teal-200 uppercase">Final Mark</p><p className="text-3xl font-extrabold">{c.mark.toFixed(2)}</p><p className="text-[10px] text-teal-200">out of 40%</p></div>
                  </div>
                </div>
              );})()}
              <div className="space-y-4 pt-4 border-t">
                <h4 className="text-sm font-bold text-teal-700 uppercase">Evaluator Details & Comments</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {[{label:"Supervisor Name",key:"svSignName",placeholder:"Full name"},{label:"Position / Designation",key:"position",placeholder:"e.g. Senior Engineer"}].map(f=>(
                    <div key={f.key}><label className="block text-xs font-semibold text-slate-600 mb-1">{f.label}:</label>
                    <input value={svDraft[f.key]||""} onChange={e=>setSvDraft({...svDraft,[f.key]:e.target.value})} placeholder={f.placeholder} className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-600"/></div>
                  ))}
                  <div><label className="block text-xs font-semibold text-slate-600 mb-1">Evaluation Date:</label>
                  <input type="date" value={svDraft.date||""} onChange={e=>setSvDraft({...svDraft,date:e.target.value})} className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-600"/></div>
                  <div><label className="block text-xs font-semibold text-slate-600 mb-1">Will you hire this student?</label>
                  <div className="flex gap-3 mt-1">
                    {["Yes","No"].map(opt=>(
                      <button key={opt} type="button" onClick={()=>setSvDraft({...svDraft,willHire:opt})}
                        className={"flex-1 py-2 rounded-lg border text-sm font-bold transition-all "+(svDraft.willHire===opt?(opt==="Yes"?"bg-emerald-600 text-white border-emerald-600":"bg-rose-500 text-white border-rose-500"):"bg-white hover:bg-slate-50 border-slate-200 text-slate-700")}>
                        {opt==="Yes"?"👍 Yes":"👎 No"}
                      </button>
                    ))}
                  </div></div>
                  <div className="sm:col-span-2"><label className="block text-xs font-semibold text-slate-600 mb-1">Other Comments:</label>
                  <textarea value={svDraft.comment||""} onChange={e=>setSvDraft({...svDraft,comment:e.target.value})} rows="3" className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-600"/></div>
                </div>
              </div>
              <div className="flex justify-between items-center pt-4 border-t">
                <span className="text-xs text-slate-400 italic">Status: {svDraft.status||"Draft"}</span>
                <div className="flex gap-3">
                  {svEvals[svActiveId]?.status!=="Submitted"&&<>
                    <button onClick={saveSvDraft} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm px-5 py-2 rounded-lg">Save Draft</button>
                    <button onClick={submitSvEval} className="bg-teal-700 hover:bg-teal-800 text-white font-bold text-sm px-6 py-2 rounded-lg shadow">Submit & Lock ✔</button>
                  </>}
                  {svEvals[svActiveId]?.status==="Submitted"&&<span className="text-emerald-700 font-bold text-sm bg-emerald-50 px-4 py-2 rounded-lg">✔ Submitted — Read Only</span>}
                </div>
              </div>
            </div>
          </div>
        )}

        {tab==="rubric"&&!activeId&&(
          <div className="space-y-4 max-w-4xl mx-auto">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-6">
              <div className="border-b pb-4 text-center">
                <h2 className="text-lg font-bold text-slate-800">UniMAP FKTEN — Rubric Assessment Guide</h2>
                <p className="text-sm text-slate-500">INTRA FKTEN MK04(B) & MK03 Criteria Descriptors</p>
              </div>
              {[{title:"Criteria 1 (MK04B): Technical Knowledge & Practical Skills — Weight 3%",items:["Rating 5: Professional description, accuracy in technical tasks and safe practices","Rating 4: Good tool familiarity, logical analysis, technical expertise","Rating 3: Moderate representation of engineering tasks","Rating 1-2: Deficiencies in instrument handling or safety precautions","Rating 0: Not capable of technical tasks"]},{title:"Criteria 2 (MK04B): Personality & Appearance — Weight 2%",items:["Rating 5: Neat appearance, excellent attitude, highly motivated","Rating 4: Good responsibility, regular motivation, appropriate confidence","Rating 3: Modest styling, average motivation","Rating 1-2: Untidy or low motivation","Rating 0: Complete lack of discipline"]},{title:"Criteria 3 (MK04B): Communication Skills — Weight 5%",items:["Rating 5: Excellent verbal articulation, clear presentation, impressive Q&A","Rating 4: Good communication flow, stable justifications","Rating 3: Moderate communication, minor hesitation","Rating 1-2: Poor vocabulary, weak phrasing","Rating 0: Inadequate presentation ability"]}].map(section=>(
                <div key={section.title} className="p-4 bg-slate-50 rounded-xl border-l-4 border-unimap-blue space-y-2">
                  <h4 className="font-bold text-slate-800 text-sm">{section.title}</h4>
                  <ul className="list-disc pl-5 text-xs text-slate-600 space-y-1">{section.items.map((item,i)=><li key={i}>{item}</li>)}</ul>
                </div>
              ))}
            </div>
          </div>
        )}

      </main>
      <footer className="bg-unimap-blue/5 print-hide border-t border-slate-200 py-5 text-center text-xs text-slate-400 mt-8">
        <p className="font-semibold text-slate-600">UniMAP Industrial Training Evaluation System · NMK40412</p>
        <p>© 2026 Universiti Malaysia Perlis · Faculty of Electronic Engineering & Technology</p>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
